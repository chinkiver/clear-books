version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: clear-books-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ClearBooksRoot2026}
      MYSQL_DATABASE: accounting
      MYSQL_USER: accounting
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ClearBooks2026}
    volumes:
      - mysql_data:/var/lib/mysql
      # Windows 下使用相对路径或已存在目录
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
      - ./mysql/conf.d:/etc/mysql/conf.d:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - clear-books-network

  # 后端 API 服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clear-books-api
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/accounting?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=accounting
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD:-ClearBooks2026}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - JWT_EXPIRATION=86400000
      - CORS_ALLOWED_ORIGINS=${CORS_ORIGINS:-http://localhost,http://localhost:8080}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      # Windows 下挂载到 Docker 卷，避免权限问题
      - app_logs:/app/logs
    networks:
      - clear-books-network

  # 前端 Nginx 服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clear-books-web
    restart: always
    ports:
      - "80:80"
      # Windows 下如果需要 HTTPS，需要 443 端口未被占用
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Windows 下使用 Docker 卷或注释掉 SSL
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - clear-books-network

volumes:
  mysql_data:
  app_logs:

networks:
  clear-books-network:
    driver: bridge
