server:
  port: 8080

spring:
  application:
    name: personal-accounting

  # H2 Database Configuration
  datasource:
    url: jdbc:h2:file:./data/accountingdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2 Console Configuration
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-must-be-at-least-32-characters}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 hours in milliseconds

# CORS Configuration
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# Logging
logging:
  level:
    com.accounting: DEBUG
    org.springframework.security: DEBUG
