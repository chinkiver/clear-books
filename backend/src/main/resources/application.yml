# 个人记账系统主配置
# 默认使用 dev 环境（MySQL + Redis），与生产环境保持一致
# 如需使用 H2 内存数据库，添加 --spring.profiles.active=h2 参数

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # 默认应用名称
  application:
    name: personal-accounting

---
# 通用配置（所有环境共享）
spring:
  config:
    activate:
      on-profile: dev
  import: optional:file:.env[.properties]

---
spring:
  config:
    activate:
      on-profile: prod
  import: optional:file:.env[.properties]

---
spring:
  config:
    activate:
      on-profile: h2
