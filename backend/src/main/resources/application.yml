# 个人记账系统主配置
# 默认使用 dev 环境（MySQL + Redis），与生产环境保持一致

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # 默认应用名称
  application:
    name: personal-accounting

---
# 开发环境配置
spring:
  config:
    activate:
      on-profile: dev
  import: optional:file:.env[.properties]

---
# 生产环境配置
spring:
  config:
    activate:
      on-profile: prod
  import: optional:file:.env[.properties]
