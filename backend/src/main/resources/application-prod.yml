spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/accounting?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:accounting}
    password: ${SPRING_DATASOURCE_PASSWORD:ClearBooks2026}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  # 禁用 H2 控制台（生产环境）
  h2:
    console:
      enabled: false

server:
  port: 8080
  # 允许外部访问
  address: 0.0.0.0
  # 压缩响应
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain

# JWT 配置
jwt:
  secret: ${JWT_SECRET:your-super-secret-jwt-key-change-in-production}
  expiration: ${JWT_EXPIRATION:86400000}

# CORS 配置
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

# 日志配置
logging:
  level:
    root: WARN
    com.accounting: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /app/logs/app.log
    max-size: 100MB
    max-history: 30
